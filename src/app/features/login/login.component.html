<div class="login-page">
  <div class="login-wrapper">
    <section class="branding">
      <h1 class="branding__title">Accura</h1>
      <p class="branding__subtitle">Gestión de Plantillas y Cargas de Datos</p>
    </section>

    <section class="login-card">
      <header class="login-card__header">
        <h2>Iniciar Sesión</h2>
        <p>Ingresa tus credenciales para acceder a la plataforma</p>
      </header>

      <form class="form" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <div class="form-stack">
          <app-text-field
            inputId="email"
            type="email"
            label="Correo"
            [control]="loginForm.controls.email"
            autocomplete="on"
            errorMessage="Ingresa un correo electrónico válido."
          >
          </app-text-field>

          <app-password-field
            inputId="password"
            label="Contraseña"
            [control]="loginForm.controls.password"
            errorMessage="La contraseña es requerida."
          >
          </app-password-field>
        </div>

        <div style="margin-top: 1rem">
          <a class="link-primary" routerLink="/recuperar-contrasena"> ¿Olvidaste tu contraseña? </a>
        </div>

        @if (serverError() || successMessage()) {
          <div>
            @if (serverError()) {
              <app-message-feedback
                [text]="serverError()!"
                severity="error"
                icon="pi pi-times-circle"
              />
            }

            @if (successMessage()) {
              <app-message-feedback
                [text]="successMessage()!"
                severity="success"
                icon="pi pi-check-circle"
              />
            }
          </div>
        }

        <app-button
          label="Iniciar sesión"
          type="submit"
          [disabled]="loginForm.invalid || isSubmitting()"
          [fluid]="true"
        ></app-button>

        <!-- <button class="submit" type="submit" [disabled]="loginForm.invalid || isSubmitting()">
          <span *ngIf="!isSubmitting(); else loading">Iniciar Sesión</span>
          <ng-template #loading>
            <span class="spinner" aria-hidden="true"></span>
            <span>Iniciando...</span>
          </ng-template>
        </button> -->
      </form>
    </section>
  </div>
</div>
