<form #templateForm="ngForm" class="template-form" (ngSubmit)="submit(templateForm)">
  <header class="template-form__header">
    <div>
      <h2>{{ title }}</h2>
      <p>{{ description }}</p>
    </div>
    <button type="button" class="icon-button" (click)="cancel()" aria-label="Cerrar">
      <span class="material-symbols-rounded" aria-hidden="true">close</span>
    </button>
  </header>

  <div class="template-form__body">
    <label class="form-field">
      <span class="form-field__label">Nombre de la Plantilla</span>
      <input
        type="text"
        name="name"
        [(ngModel)]="formModel.name"
        required
        minlength="3"
        maxlength="80"
        placeholder="Ej. Plantilla de Ventas"
      />
      <span class="form-field__hint">Asigna un nombre descriptivo para identificar la plantilla.</span>
    </label>

    <label class="form-field">
      <span class="form-field__label">Descripción</span>
      <textarea
        name="description"
        [(ngModel)]="formModel.description"
        required
        minlength="10"
        maxlength="280"
        rows="4"
        placeholder="Describe la finalidad y alcance de esta plantilla"
      ></textarea>
      <span class="form-field__hint">Explica cómo y cuándo debe usarse esta plantilla.</span>
    </label>
  </div>

  <footer class="template-form__footer">
    <button type="button" class="button button--ghost" (click)="cancel()">Cancelar</button>
    <button type="submit" class="button button--primary">{{ actionLabel }}</button>
  </footer>
</form>
