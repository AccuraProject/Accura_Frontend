<div class="flex flex-col gap-1">
  @if (label) {
    <p-floatlabel variant="on">
      <input
        pInputText
        [id]="computedInputId"
        [type]="type"
        [formControl]="control"
        [required]="required"
        [readonly]="readonly"
        [disabled]="disabled"
        [autocomplete]="autocomplete"
        [fluid]="fluid"
        [invalid]="showError"
      />
      <label [for]="computedInputId">
        {{ label }}
      </label>
    </p-floatlabel>
  }

  @if (!label) {
    <input
      pInputText
      [id]="computedInputId"
      [type]="type"
      [formControl]="control"
      [placeholder]="placeholder"
      [required]="required"
      [readonly]="readonly"
      [disabled]="disabled"
      [autocomplete]="autocomplete"
      [fluid]="fluid"
      [invalid]="showError"
    />
  }

  @if (showError) {
    <p-message severity="error" variant="simple" size="small" styleClass="field-error-message">
      {{ errorText }}
    </p-message>
  }
</div>
