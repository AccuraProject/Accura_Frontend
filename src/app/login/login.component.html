<div class="login-page">
  <div class="login-wrapper">
    <section class="branding">
      <h1 class="branding__title">Accura</h1>
      <p class="branding__subtitle">Gestión de Planillas y Cargas de Datos</p>
    </section>

    <section class="login-card">
      <header class="login-card__header">
        <h2>Iniciar Sesión</h2>
        <p>Ingresa tus credenciales para acceder a la plataforma</p>
      </header>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" novalidate>
        <div class="form-field" [class.form-field--invalid]="showEmailError()">
          <label for="email">Correo Electrónico</label>
          <input
            id="email"
            type="email"
            placeholder="tu@correo.com"
            formControlName="email"
            autocomplete="email"
          />
          <small *ngIf="showEmailError()">Ingresa un correo electrónico válido.</small>
        </div>

        <div class="form-field" [class.form-field--invalid]="showPasswordError()">
          <label for="password">Contraseña</label>
          <input
            id="password"
            type="password"
            placeholder="••••••••"
            formControlName="password"
            autocomplete="current-password"
          />
          <small *ngIf="showPasswordError()">La contraseña es obligatoria.</small>
        </div>

        <div class="form-extras">
          <label class="remember">
            <input type="checkbox" formControlName="rememberMe" />
            <span>Recordarme</span>
          </label>
          <a class="forgot-password" href="#" rel="noopener noreferrer">¿Olvidaste tu contraseña?</a>
        </div>

        <div class="feedback" *ngIf="serverError() || successMessage()">
          <p class="feedback__error" *ngIf="serverError()">{{ serverError() }}</p>
          <p class="feedback__success" *ngIf="successMessage()">{{ successMessage() }}</p>
        </div>

        <button class="submit" type="submit" [disabled]="loginForm.invalid || isSubmitting()">
          <span *ngIf="!isSubmitting(); else loading">Iniciar Sesión</span>
          <ng-template #loading>
            <span class="spinner" aria-hidden="true"></span>
            <span>Iniciando...</span>
          </ng-template>
        </button>
      </form>
    </section>
  </div>
</div>
