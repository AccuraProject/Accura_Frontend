<header class="modal__header">
  <div>
    <h3>Eliminar Regla de Validación</h3>
    <p>Esta acción no se puede deshacer</p>
  </div>
  <button class="icon-button" type="button" (click)="cancel()" aria-label="Cerrar">
    <span class="material-symbols-rounded" aria-hidden="true">close</span>
  </button>
</header>

<div mat-dialog-content>
  <div class="modal__alert" role="alert">
    <span class="material-symbols-rounded" aria-hidden="true">warning</span>
    <div>
      <p class="modal__alert-title">
        ¿Estás seguro de que deseas eliminar la regla <strong>{{ data.name }}</strong>?
      </p>
    </div>
  </div>
</div>

<footer mat-dialog-actions class="modal__actions">
  <button class="modal__button modal__button--ghost" type="button" (click)="cancel()">
    Cancelar
  </button>
  <button class="modal__button modal__button--danger" type="button" (click)="confirm()">
    Eliminar Regla
  </button>
</footer>
