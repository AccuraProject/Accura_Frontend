<section class="page-header">
  <div>
    <p class="page-header__pretitle">Panel de Administración</p>
    <h1 class="page-header__title">Bienvenido al panel de control de Accura</h1>
  </div>
</section>

<section class="stats">
  <mat-card
    *ngFor="let stat of stats"
    class="stats__card"
    [class.stats__card--highlight]="stat.highlight"
  >
    <div class="stats__header">
      <p class="stats__title">{{ stat.title }}</p>
      <mat-icon class="stats__icon" fontSet="material-symbols-rounded">{{ stat.icon }}</mat-icon>
    </div>
    <p class="stats__value">{{ stat.value }}</p>
    <p class="stats__change">{{ stat.change }}</p>
  </mat-card>
</section>

<section class="dashboard-grid">
  <mat-card class="panel">
    <mat-card-header class="panel__header">
      <mat-card-title>Actividad Reciente</mat-card-title>
      <button mat-button class="panel__link" type="button">Ver historial completo</button>
    </mat-card-header>
    <mat-card-content>
      <ul class="timeline">
        <li *ngFor="let item of activity" class="timeline__item">
          <div class="timeline__marker"></div>
          <div>
            <p class="timeline__title">{{ item.name }}</p>
            <p class="timeline__description">{{ item.action }}</p>
            <p class="timeline__time">{{ item.time }}</p>
          </div>
        </li>
      </ul>
    </mat-card-content>
  </mat-card>

  <mat-card class="panel">
    <mat-card-header class="panel__header">
      <mat-card-title>Acceso Rápido</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <div class="quick-actions">
        <button
          mat-stroked-button
          color="primary"
          *ngFor="let action of quickActions"
          class="quick-actions__item"
          type="button"
          (click)="handleAction(action)"
        >
          <span class="quick-actions__label">{{ action.label }}</span>
          <span class="quick-actions__description">{{ action.description }}</span>
        </button>
      </div>
    </mat-card-content>
  </mat-card>
</section>
