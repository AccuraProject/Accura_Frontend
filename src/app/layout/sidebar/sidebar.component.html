<aside class="sidebar" [class.sidebar--open]="mobileNavOpen">
  <mat-nav-list class="sidebar__nav" aria-label="Navegación principal">
    <button
      mat-list-item
      *ngFor="let item of navigation"
      class="sidebar__link"
      type="button"
      (click)="navigate(item)"
      [class.sidebar__link--active]="isActive(item)"
      [attr.aria-current]="isActive(item) ? 'page' : null"
    >
      <mat-icon class="sidebar__icon" fontSet="material-symbols-rounded" aria-hidden="true">
        {{ item.icon }}
      </mat-icon>
      <span class="sidebar__label">{{ item.label }}</span>
    </button>
  </mat-nav-list>
</aside>
