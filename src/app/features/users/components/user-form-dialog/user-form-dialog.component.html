<app-dialog-shell
  [(visible)]="visible"
  [title]="title"
  [description]="description"
  [saveDisabled]="userForm.invalid"
  [saveLabel]="actionLabel"
  (cancel)="cancel()"
  (save)="submit()"
>
  <form class="form" [formGroup]="userForm" (ngSubmit)="submit()">
    <div class="form-stack">
      <app-text-field
        inputId="name"
        type="text"
        label="Nombre completo"
        [control]="userForm.controls.name"
        autocomplete="name"
        errorMessage="Ingresa al menos 3 caracteres."
      >
      </app-text-field>

      <app-text-field
        inputId="email"
        type="email"
        label="Correo electrónico"
        [control]="userForm.controls.email"
        autocomplete="email"
        errorMessage="Ingresa un correo electrónico válido."
        [readonly]="isEditMode"
      >
      </app-text-field>

      @if (isEditMode) {
        <div class="form-field">
          <label for="status">Estado</label>

          <p-select
            inputId="status"
            formControlName="status"
            [options]="statusOptions"
            optionLabel="label"
            optionValue="value"
            placeholder="Selecciona"
            [invalid]="userForm.controls.status.invalid && userForm.controls.status.touched"
            styleClass="w-full"
          />

          @if (userForm.controls.status.invalid && userForm.controls.status.touched) {
            <small class="modal__error">Selecciona el estado del usuario.</small>
          }
        </div>
      }

      <app-select-field
        inputId="role"
        label="Rol"
        [control]="userForm.controls.roleId"
        [options]="roles"
        optionLabel="label"
        optionValue="id"
        [disabled]="true"
      >
      </app-select-field>

      @if (isEditMode) {
        <small class="modal__hint">
          El correo electrónico solo puede cambiarse desde la configuración avanzada del usuario.
        </small>
      }
    </div>
  </form>
</app-dialog-shell>
