<section class="page-header">
  <div>
    <p class="page-header__pretitle">Configuración</p>
    <h1 class="page-header__title">Administra tu perfil</h1>
    <p class="page-header__subtitle">
      Actualiza tu información personal y mantén segura tu cuenta.
    </p>
  </div>
</section>

<div class="grid">
  <div class="card">
    <header class="card__header">
      <div class="card__icon">
        <i class="pi pi-id-card" style="font-size: 1.5rem"></i>
      </div>
      <div>
        <h2>Información personal</h2>
        <p>Actualiza tus datos visibles para el resto del equipo.</p>
      </div>
    </header>

    <form class="form" [formGroup]="personalInfoForm" (ngSubmit)="onSubmitPersonalInfo()">
      <div class="form-stack">
        <app-text-field
          inputId="fullName"
          type="text"
          icon="pi pi-user"
          label="Nombre completo"
          [control]="personalInfoForm.controls.fullName"
          autocomplete="on"
        >
        </app-text-field>

        <app-text-field
          inputId="fullName"
          type="text"
          icon="pi pi-cog"
          label="Rol"
          [control]="personalInfoForm.controls.role"
        >
        </app-text-field>

        <app-text-field
          inputId="email"
          type="email"
          icon="pi pi-envelope"
          label="Correo electrónico"
          [control]="personalInfoForm.controls.email"
          autocomplete="on"
          errorMessage="Ingresa un correo electrónico válido."
        >
        </app-text-field>
      </div>

      <div class="form-actions">
        <app-button
          [label]="isSubmittingPersonalInfo() ? 'Actualizando...' : 'Guardar cambios'"
          type="submit"
          [loading]="isSubmittingPersonalInfo()"
          [disabled]="personalInfoForm.invalid || isSubmittingPersonalInfo()"
          [fluid]="true"
        ></app-button>
      </div>
    </form>
  </div>

  <div class="card">
    <header class="card__header">
      <div class="card__icon">
        <i class="pi pi-key" style="font-size: 1.5rem"></i>
      </div>
      <div>
        <h2>Cambiar contraseña</h2>
        <p>Reemplaza tu contraseña actual por una más segura.</p>
      </div>
    </header>

    <form class="form" [formGroup]="changePasswordForm" (ngSubmit)="onSubmitChangePassword()">
      <div class="form-stack">
        <app-password-field
          inputId="password"
          icon="pi pi-lock"
          label="Contraseña"
          [control]="changePasswordForm.controls.currentPassword"
        >
        </app-password-field>

        <app-password-field
          inputId="password"
          icon="pi pi-lock"
          label="Nueva contraseña"
          [control]="changePasswordForm.controls.newPassword"
        >
        </app-password-field>

        <app-password-field
          inputId="password"
          icon="pi pi-lock"
          label="Confirmar contraseña"
          [control]="changePasswordForm.controls.confirmPassword"
          errorMessage="Las contraseñas no coinciden."
        >
        </app-password-field>
      </div>

      <div class="form-actions">
        <app-button
          [label]="isSubmittingChangePassword() ? 'Actualizando...' : 'Actualizar contraseña'"
          type="submit"
          [loading]="isSubmittingChangePassword()"
          [disabled]="changePasswordForm.invalid || isSubmittingChangePassword()"
          [fluid]="true"
        ></app-button>
      </div>
    </form>
  </div>
</div>
