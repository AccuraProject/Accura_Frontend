<p-button
  [label]="computedLabel"
  [icon]="icon"
  [severity]="severity"
  [type]="type"
  [iconPos]="iconPos"
  [outlined]="outlined"
  [text]="text"
  [raised]="raised"
  [rounded]="rounded"
  [loading]="loading"
  [disabled]="disabled"
  [fluid]="fluid"
  [ariaLabel]="ariaLabel"
  [styleClass]="styleClass"
  (onClick)="onClick($event)">
</p-button>
