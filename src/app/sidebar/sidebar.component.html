<aside class="sidebar">
  <div class="sidebar__brand">
    <span class="sidebar__logo" aria-hidden="true">A</span>
    <div class="sidebar__brand-text">
      <span class="sidebar__brand-name">Accura</span>
      <span class="sidebar__brand-subtitle">Panel de Administración</span>
    </div>
  </div>

  <nav class="sidebar__section" aria-label="Navegación principal">
    <h2 class="sidebar__section-title">General</h2>
    <ul class="sidebar__list">
      <li *ngFor="let item of mainNavigation" class="sidebar__item" [class.is-active]="item.active">
        <a class="sidebar__link" href="#">
          <span class="sidebar__icon" aria-hidden="true">
            <ng-container [ngSwitch]="item.icon">
              <svg *ngSwitchCase="'home'" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path
                  d="M3 10.5L12 3L21 10.5V20.25C21 20.6642 20.8358 21.0613 20.5445 21.3525C20.2533 21.6437 19.8561 21.8079 19.4419 21.8079H16.5C16.0858 21.8079 15.6887 21.6437 15.3975 21.3525C15.1063 21.0613 14.9421 20.6642 14.9421 20.25V15.75H9.05789V20.25C9.05789 20.6642 8.89371 21.0613 8.60249 21.3525C8.31127 21.6437 7.91415 21.8079 7.5 21.8079H4.55811C4.14389 21.8079 3.74677 21.6437 3.45555 21.3525C3.16433 21.0613 3.00016 20.6642 3.00016 20.25L3 10.5Z"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
              <svg *ngSwitchCase="'users'" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path
                  d="M15 21V19.5C15 18.7044 14.6849 17.9413 14.1213 17.3787C13.5577 16.8151 12.7946 16.5 12 16.5H6C5.20435 16.5 4.44129 16.8151 3.87768 17.3787C3.31407 17.9413 3 18.7044 3 19.5V21"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <path
                  d="M9 12C10.6569 12 12 10.6569 12 9C12 7.34315 10.6569 6 9 6C7.34315 6 6 7.34315 6 9C6 10.6569 7.34315 12 9 12Z"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <path
                  d="M21 21V19.5C20.9995 18.837 20.7796 18.1921 20.3733 17.6722C19.9671 17.1522 19.3988 16.7876 18.75 16.6388"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <path
                  d="M15.75 6.63875C16.3992 6.78763 16.9682 7.15224 17.3746 7.67217C17.7811 8.1921 18.0012 8.837 18.0012 9.5C18.0012 10.163 17.7811 10.8079 17.3746 11.3278C16.9682 11.8478 16.3992 12.2124 15.75 12.3612"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
              <svg *ngSwitchCase="'shield'" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path
                  d="M12 3L21 6.75V11.625C21 16.92 17.665 21.795 12 23C6.335 21.795 3 16.92 3 11.625V6.75L12 3Z"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <path
                  d="M9.75 11.625L11.25 13.125L14.25 9.75"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
              <svg *ngSwitchCase="'layers'" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path
                  d="M12 3L3 9L12 15L21 9L12 3Z"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <path
                  d="M3 15L12 21L21 15"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
              <svg *ngSwitchCase="'key'" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path
                  d="M15.75 9.75C15.75 12.5114 13.5114 14.75 10.75 14.75C7.98858 14.75 5.75 12.5114 5.75 9.75C5.75 6.98858 7.98858 4.75 10.75 4.75C13.5114 4.75 15.75 6.98858 15.75 9.75Z"
                  stroke="currentColor"
                  stroke-width="1.5"
                />
                <path d="M15.5 9.75H21.5V12.25" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
                <path d="M18.5 9.75V12.75" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
                <path
                  d="M12.5 9.75C12.5 10.7165 11.7165 11.5 10.75 11.5C9.7835 11.5 9 10.7165 9 9.75C9 8.7835 9.7835 8 10.75 8C11.7165 8 12.5 8.7835 12.5 9.75Z"
                  fill="currentColor"
                />
              </svg>
              <svg *ngSwitchCase="'clock'" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path
                  d="M21 12C21 16.9706 16.9706 21 12 21C7.02944 21 3 16.9706 3 12C3 7.02944 7.02944 3 12 3C16.9706 3 21 7.02944 21 12Z"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <path d="M12 6.75V12L15.75 13.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
              </svg>
              <svg *ngSwitchCase="'settings'" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path
                  d="M12 15.75C13.5188 15.75 14.75 14.5188 14.75 13C14.75 11.4812 13.5188 10.25 12 10.25C10.4812 10.25 9.25 11.4812 9.25 13C9.25 14.5188 10.4812 15.75 12 15.75Z"
                  stroke="currentColor"
                  stroke-width="1.5"
                />
                <path
                  d="M19.5 13C19.5 12.505 19.4475 12.0125 19.3425 11.5325L21.375 9.775L19.225 6.225L16.805 6.855C16.1025 6.345 15.3325 5.94 14.505 5.6625L14.25 3H9.75L9.495 5.6625C8.6675 5.94 7.8975 6.345 7.195 6.855L4.775 6.225L2.625 9.775L4.6575 11.5325C4.5525 12.0125 4.5 12.505 4.5 13C4.5 13.495 4.5525 13.9875 4.6575 14.4675L2.625 16.225L4.775 19.775L7.195 19.145C7.8975 19.655 8.6675 20.06 9.495 20.3375L9.75 23H14.25L14.505 20.3375C15.3325 20.06 16.1025 19.655 16.805 19.145L19.225 19.775L21.375 16.225L19.3425 14.4675C19.4475 13.9875 19.5 13.495 19.5 13Z"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
              <svg *ngSwitchCase="'plus'" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 5V19" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
                <path d="M5 12H19" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
              </svg>
              <svg *ngSwitchCase="'cloud'" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path
                  d="M7.5 18C5.01472 18 3 15.9853 3 13.5C3 11.14 4.895 9.1925 7.2075 9.015C7.9575 6.1225 10.6512 4 13.75 4C17.2012 4 20 6.79875 20 10.25C21.6562 10.25 23 11.5938 23 13.25C23 14.9062 21.6562 16.25 20 16.25H7.5V18Z"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
              <svg *ngSwitchCase="'logout'" class="sidebar__logout-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M15 17L21 12L15 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                <path d="M21 12H9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                <path
                  d="M12 21H6C5.20435 21 4.44129 20.6849 3.87768 20.1213C3.31407 19.5577 3 18.7946 3 18V6C3 5.20435 3.31407 4.44129 3.87768 3.87768C4.44129 3.31407 5.20435 3 6 3H12"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </ng-container>
          </span>
          <span class="sidebar__label">{{ item.label }}</span>
          <span class="sidebar__badge" *ngIf="item.badge">{{ item.badge }}</span>
        </a>
      </li>
    </ul>
  </nav>

  <div class="sidebar__divider" role="presentation"></div>

  <section class="sidebar__section" aria-label="Accesos rápidos">
    <h2 class="sidebar__section-title">Acceso Rápido</h2>
    <ul class="sidebar__list sidebar__list--compact">
      <li *ngFor="let action of quickActions" class="sidebar__item">
        <button class="sidebar__action" type="button">
          <span class="sidebar__icon" aria-hidden="true">
            <ng-container [ngSwitch]="action.icon">
              <svg *ngSwitchCase="'users'" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path
                  d="M15 21V19.5C15 18.7044 14.6849 17.9413 14.1213 17.3787C13.5577 16.8151 12.7946 16.5 12 16.5H6C5.20435 16.5 4.44129 16.8151 3.87768 17.3787C3.31407 17.9413 3 18.7044 3 19.5V21"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
                <path
                  d="M9 12C10.6569 12 12 10.6569 12 9C12 7.34315 10.6569 6 9 6C7.34315 6 6 7.34315 6 9C6 10.6569 7.34315 12 9 12Z"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
              <svg *ngSwitchCase="'plus'" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 5V19" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
                <path d="M5 12H19" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
              </svg>
              <svg *ngSwitchCase="'cloud'" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path
                  d="M7.5 18C5.01472 18 3 15.9853 3 13.5C3 11.14 4.895 9.1925 7.2075 9.015C7.9575 6.1225 10.6512 4 13.75 4C17.2012 4 20 6.79875 20 10.25C21.6562 10.25 23 11.5938 23 13.25C23 14.9062 21.6562 16.25 20 16.25H7.5V18Z"
                  stroke="currentColor"
                  stroke-width="1.5"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </ng-container>
          </span>
          <span class="sidebar__label">{{ action.label }}</span>
        </button>
      </li>
    </ul>
  </section>

  <footer class="sidebar__footer">
    <div class="sidebar__profile">
      <div class="sidebar__avatar" aria-hidden="true">MC</div>
      <div class="sidebar__profile-info">
        <p class="sidebar__name">María Campos</p>
        <p class="sidebar__role">Administradora</p>
      </div>
    </div>
    <button class="sidebar__logout" type="button">
      <span class="sidebar__icon sidebar__icon--logout" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M15 17L21 12L15 7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
          <path d="M21 12H9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
          <path
            d="M12 21H6C5.20435 21 4.44129 20.6849 3.87768 20.1213C3.31407 19.5577 3 18.7946 3 18V6C3 5.20435 3.31407 4.44129 3.87768 3.87768C4.44129 3.31407 5.20435 3 6 3H12"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          />
        </svg>
      </span>
      Cerrar sesión
    </button>
  </footer>
</aside>
