<aside class="sidebar" [class.sidebar--open]="mobileNavOpen">
  <nav class="sidebar__nav" aria-label="Navegación principal">
    <a
      *ngFor="let item of navigation"
      class="sidebar__link"
      [class.sidebar__link--active]="item.active"
      href="#"
      (click)="onNavigate()"
    >
      <span class="sidebar__icon material-symbols-rounded" aria-hidden="true">
        {{ item.icon }}
      </span>
      <span>{{ item.label }}</span>
    </a>
  </nav>
</aside>
