<mat-toolbar class="toolbar">
  <div class="toolbar__brand">
    <button
      mat-icon-button
      class="toolbar__menu"
      type="button"
      aria-label="Abrir navegación"
      (click)="onToggleMenu()"
    >
      <mat-icon fontSet="material-symbols-rounded">menu</mat-icon>
    </button>
    <div class="toolbar__logo">A</div>
    <p class="toolbar__title">Accura</p>
  </div>

  <div class="toolbar__actions">
    <button mat-icon-button class="toolbar__icon" type="button" aria-label="Notificaciones">
      <mat-icon fontSet="material-symbols-rounded">notifications</mat-icon>
      <span class="toolbar__badge" aria-hidden="true">{{ notifications }}</span>
    </button>
    <button mat-button class="toolbar__profile" type="button">
      <span class="toolbar__avatar">AB</span>
      <span class="toolbar__name">Cerrar Sesión</span>
    </button>
  </div>
</mat-toolbar>
