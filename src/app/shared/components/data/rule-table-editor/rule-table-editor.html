<div class="rule-table-editor__toolbar">
  <app-button
    label="Descargar plantilla"
    icon="pi pi-download"
    variant="secondary"
    [outlined]="true"
    type="button"
    [disabled]="true"
  ></app-button>
  <app-button
    label="Importar desde Excel"
    icon="pi pi-upload"
    variant="secondary"
    [outlined]="true"
    type="button"
    [disabled]="true"
  ></app-button>
</div>
<div class="rule-table-editor__wrapper">
  <p-table [value]="rows" scrollable="true" scrollHeight="300px">
    <ng-template pTemplate="header">
      <tr>
        @for (column of columns; track column) {
          <th>{{ column }}</th>
        }
        <th style="text-align: center; width: 80px">Acciones</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-row let-rowIndex="rowIndex">
      <tr>
        @for (column of columns; track column) {
          <td>{{ row[column] }}</td>
        }

        <td style="text-align: center">
          <app-button
            icon="pi pi-trash"
            [iconOnly]="true"
            variant="danger"
            [text]="true"
            type="button"
            (clicked)="removeRow(rowIndex)"
          ></app-button>
        </td>
      </tr>
    </ng-template>

    <!-- 🔥 fila de draft -->
    <ng-template pTemplate="footer">
      <tr>
        @for (column of columns; track column) {
          <td>
            <input
              pInputText
              type="text"
              [(ngModel)]="draftRow[column]"
              [placeholder]="'Agregar ' + column.toLowerCase()"
              (keyup.enter)="addRow()"
              fluid="true"
            />
          </td>
        }

        <td>
          <app-button
            label="Agregar"
            type="button"
            [disabled]="!canAddRow"
            (clicked)="addRow()"
          ></app-button>
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
